# Reusable workflow to publish crates to crates.io
# Triggered by the release workflow after a successful release
name: Publish to crates.io

on:
  workflow_call:

permissions:
  id-token: write
  packages: write

jobs:
  publish-crates:
    name: Publish crates
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish crates
        shell: bash
        run: |
          # Publish in dependency order: core → builders → runtime → cli
          for crate in serverless_workflow_core serverless_workflow_builders serverless_workflow_runtime serverless_workflow_cli; do
            echo "Publishing $crate..."
            cargo publish -p "$crate" --registry crates-io --allow-dirty
            echo "Waiting for index to sync..."
            sleep 30
          done
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

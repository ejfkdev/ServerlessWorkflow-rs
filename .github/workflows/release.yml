#
# CI that:
#
# * runs tests on push/PR
# * checks for a Git Tag that looks like a release
# * builds bare executables with dist + UPX compression
# * uploads those binaries to a GitHub Release
# * publishes crates to crates.io

name: Release
permissions:
  "contents": "write"

on:
  pull_request:
  push:
    tags:
      - '**[0-9]+.[0-9]+.[0-9]+*'

jobs:
  # Run tests first
  test:
    name: Test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-key: "v2-lockfile"
      - run: cargo test --workspace
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo fmt --check --all

  # Run 'dist plan' (or host) to determine what tasks we need to do
  plan:
    needs:
      - test
    runs-on: "ubuntu-22.04"
    outputs:
      val: ${{ steps.plan.outputs.manifest }}
      tag: ${{ !github.event.pull_request && github.ref_name || '' }}
      tag-flag: ${{ !github.event.pull_request && format('--tag={0}', github.ref_name) || '' }}
      publishing: ${{ !github.event.pull_request }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install dist
        shell: bash
        run: "curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.31.0/cargo-dist-installer.sh | sh"
      - name: Cache dist
        uses: actions/upload-artifact@v6
        with:
          name: cargo-dist-cache
          path: ~/.cargo/bin/dist
      - id: plan
        run: |
          dist ${{ (!github.event.pull_request && format('host --steps=create --tag={0}', github.ref_name)) || 'plan' }} --output-format=json > plan-dist-manifest.json
          echo "dist ran successfully"
          cat plan-dist-manifest.json
          echo "manifest=$(jq -c "." plan-dist-manifest.json)" >> "$GITHUB_OUTPUT"
      - name: "Upload dist-manifest.json"
        uses: actions/upload-artifact@v6
        with:
          name: artifacts-plan-dist-manifest
          path: plan-dist-manifest.json

  # Build and packages all the platform-specific things
  build-local-artifacts:
    name: build-local-artifacts (${{ join(matrix.targets, ', ') }})
    needs:
      - plan
    if: ${{ fromJson(needs.plan.outputs.val).ci.github.artifacts_matrix.include != null && (needs.plan.outputs.publishing == 'true' || fromJson(needs.plan.outputs.val).ci.github.pr_run_mode == 'upload') }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.val).ci.github.artifacts_matrix }}
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container && matrix.container.image || null }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BUILD_MANIFEST_NAME: target/distrib/${{ join(matrix.targets, '-') }}-dist-manifest.json
      SWF_VERSION: ${{ !github.event.pull_request && github.ref_name || '' }}
    steps:
      - name: enable windows longpaths
        run: |
          git config --global core.longpaths true
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install Rust non-interactively if not already installed
        if: ${{ matrix.container }}
        run: |
          if ! command -v cargo > /dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          fi
      - name: Install dist
        run: ${{ matrix.install_dist.run }}
      - name: Fetch local artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: artifacts-*
          path: target/distrib/
          merge-multiple: true
      - name: Install dependencies
        run: |
          ${{ matrix.packages_install }}
      - name: Install cross-compilation targets
        if: matrix.host != matrix.targets[0]
        shell: bash
        run: |
          for target in ${{ join(matrix.targets, ' ') }}; do
            if [ "$target" != "$(rustc -vV | grep host | cut -d' ' -f2)" ]; then
              rustup target add "$target"
            fi
          done
      - name: Install musl cross-compilation toolchain
        if: contains(join(matrix.targets, ' '), 'musl') && runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          if contains(join(matrix.targets, ' '), 'aarch64-unknown-linux-musl'); then
            sudo apt-get install -y gcc-aarch64-linux-gnu musl-tools
            mkdir -p ~/.cargo
            cat >> ~/.cargo/config.toml << 'TOML'
          [target.aarch64-unknown-linux-musl]
          linker = "aarch64-linux-gnu-gcc"
          TOML
          fi
          if contains(join(matrix.targets, ' '), 'x86_64-unknown-linux-musl'); then
            sudo apt-get install -y musl-tools
          fi
      - name: Build artifacts
        run: |
          dist build ${{ needs.plan.outputs.tag-flag }} --print=linkage --output-format=json ${{ matrix.dist_args }} > dist-manifest.json
          echo "dist ran successfully"
      - name: Install UPX
        if: runner.os == 'Linux' || runner.os == 'Windows'
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y upx-ucl || true
            if ! command -v upx &> /dev/null; then
              curl -L https://github.com/upx/upx/releases/download/v4.2.4/upx-4.2.4-amd64_linux.tar.xz | tar xJ
              sudo cp upx-4.2.4-amd64_linux/upx /usr/local/bin/
            fi
          elif [ "$RUNNER_OS" = "Windows" ]; then
            choco install upx || true
            if ! command -v upx &> /dev/null; then
              curl -L -o upx.zip https://github.com/upx/upx/releases/download/v4.2.4/upx-4.2.4-win64.zip
              7z e upx.zip -oc:\upx *.exe -r
              echo "c:\upx" >> $GITHUB_PATH
            fi
          fi
      - name: Compress binaries with UPX
        if: runner.os == 'Linux' || runner.os == 'Windows'
        shell: bash
        run: |
          find target/distrib -type f \( -name 'swf' -o -name 'swf.exe' \) | while read binary; do
            if command -v upx &> /dev/null; then
              echo "Compressing $binary with UPX..."
              upx --best "$binary" || echo "UPX compression failed for $binary (non-fatal)"
            fi
          done
      - name: Prepare bare binaries for release
        shell: bash
        run: |
          mkdir -p target/release-binaries
          TARGET="${{ join(matrix.targets, '-') }}"
          # Find the built binary and rename with platform suffix
          find target/distrib -type f \( -name 'swf' -o -name 'swf.exe' \) | while read binary; do
            ext="${binary##*.}"
            if [ "$ext" = "exe" ]; then
              cp "$binary" "target/release-binaries/swf-${TARGET}.exe"
            else
              cp "$binary" "target/release-binaries/swf-${TARGET}"
            fi
          done
          # Also extract from archives if binary not found directly
          for archive in target/distrib/*.tar.xz target/distrib/*.zip; do
            if [ ! -f "$archive" ]; then continue; fi
            tmpdir=$(mktemp -d)
            if [[ "$archive" == *.tar.xz ]]; then
              tar xJf "$archive" -C "$tmpdir" 2>/dev/null || true
            elif [[ "$archive" == *.zip ]]; then
              unzip -o "$archive" -d "$tmpdir" 2>/dev/null || true
            fi
            find "$tmpdir" -type f \( -name 'swf' -o -name 'swf.exe' \) | while read binary; do
              ext="${binary##*.}"
              if [ "$ext" = "exe" ]; then
                cp "$binary" "target/release-binaries/swf-${TARGET}.exe"
              else
                cp "$binary" "target/release-binaries/swf-${TARGET}"
              fi
            done
            rm -rf "$tmpdir"
          done
          ls -la target/release-binaries/
      - id: cargo-dist
        name: Post-build
        shell: bash
        run: |
          echo "paths<<EOF" >> "$GITHUB_OUTPUT"
          dist print-upload-files-from-manifest --manifest dist-manifest.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          cp dist-manifest.json "$BUILD_MANIFEST_NAME"
      - name: "Upload artifacts"
        uses: actions/upload-artifact@v6
        with:
          name: artifacts-build-local-${{ join(matrix.targets, '_') }}
          path: |
            ${{ steps.cargo-dist.outputs.paths }}
            ${{ env.BUILD_MANIFEST_NAME }}
      - name: "Upload bare binaries"
        uses: actions/upload-artifact@v6
        with:
          name: bare-binaries-${{ join(matrix.targets, '_') }}
          path: target/release-binaries/

  # Build and package all the platform-agnostic(ish) things
  build-global-artifacts:
    needs:
      - plan
      - build-local-artifacts
    runs-on: "ubuntu-22.04"
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BUILD_MANIFEST_NAME: target/distrib/global-dist-manifest.json
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install cached dist
        uses: actions/download-artifact@v7
        with:
          name: cargo-dist-cache
          path: ~/.cargo/bin/
      - run: chmod +x ~/.cargo/bin/dist
      - name: Fetch local artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: artifacts-*
          path: target/distrib/
          merge-multiple: true
      - id: cargo-dist
        shell: bash
        run: |
          dist build ${{ needs.plan.outputs.tag-flag }} --output-format=json "--artifacts=global" > dist-manifest.json
          echo "dist ran successfully"

          echo "paths<<EOF" >> "$GITHUB_OUTPUT"
          jq --raw-output ".upload_files[]" dist-manifest.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          cp dist-manifest.json "$BUILD_MANIFEST_NAME"
      - name: "Upload artifacts"
        uses: actions/upload-artifact@v6
        with:
          name: artifacts-build-global
          path: |
            ${{ steps.cargo-dist.outputs.paths }}
            ${{ env.BUILD_MANIFEST_NAME }}
  # Determines if we should publish/announce
  host:
    needs:
      - plan
      - build-local-artifacts
      - build-global-artifacts
    if: ${{ always() && needs.plan.result == 'success' && needs.plan.outputs.publishing == 'true' && (needs.build-global-artifacts.result == 'skipped' || needs.build-global-artifacts.result == 'success') && (needs.build-local-artifacts.result == 'skipped' || needs.build-local-artifacts.result == 'success') }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    runs-on: "ubuntu-22.04"
    outputs:
      val: ${{ steps.host.outputs.manifest }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install cached dist
        uses: actions/download-artifact@v7
        with:
          name: cargo-dist-cache
          path: ~/.cargo/bin/
      - run: chmod +x ~/.cargo/bin/dist
      - name: Fetch artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: artifacts-*
          path: target/distrib/
          merge-multiple: true
      - id: host
        shell: bash
        run: |
          dist host ${{ needs.plan.outputs.tag-flag }} --steps=upload --steps=release --output-format=json > dist-manifest.json
          echo "artifacts uploaded and released successfully"
          cat dist-manifest.json
          echo "manifest=$(jq -c "." dist-manifest.json)" >> "$GITHUB_OUTPUT"
      - name: "Upload dist-manifest.json"
        uses: actions/upload-artifact@v6
        with:
          name: artifacts-dist-manifest
          path: dist-manifest.json
      # Download bare binaries and upload to release
      - name: Fetch bare binaries
        uses: actions/download-artifact@v7
        with:
          pattern: bare-binaries-*
          path: release-binaries/
          merge-multiple: true
      - name: Upload bare binaries to release
        if: needs.plan.outputs.tag != ''
        shell: bash
        run: |
          TAG="${{ needs.plan.outputs.tag }}"
          chmod +x release-binaries/swf-* 2>/dev/null || true
          for binary in release-binaries/swf-*; do
            if [ -f "$binary" ]; then
              echo "Uploading $(basename $binary) to release $TAG"
              gh release upload "$TAG" "$binary" --clobber
            fi
          done

  custom-publish-crates:
    needs:
      - plan
      - host
    if: ${{ !fromJson(needs.plan.outputs.val).announcement_is_prerelease || fromJson(needs.plan.outputs.val).publish_prereleases }}
    uses: ./.github/workflows/publish-crates.yml
    with:
      plan: ${{ needs.plan.outputs.val }}
    secrets: inherit
    permissions:
      "id-token": "write"
      "packages": "write"

  announce:
    needs:
      - plan
      - host
      - custom-publish-crates
    if: ${{ always() && needs.host.result == 'success' && (needs.custom-publish-crates.result == 'skipped' || needs.custom-publish-crates.result == 'success') }}
    runs-on: "ubuntu-22.04"
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive

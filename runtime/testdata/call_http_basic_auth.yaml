document:
  dsl: '1.0.0'
  namespace: test
  name: call-http-basic-auth
  version: '0.1.0'
use:
  secrets:
    - mySecret
do:
  - getProtected:
      call: http
      with:
        method: get
        endpoint:
          uri: http://localhost:9876/protected
          authentication:
            basic:
              username: ${$secret.mySecret.username}
              password: ${$secret.mySecret.password}

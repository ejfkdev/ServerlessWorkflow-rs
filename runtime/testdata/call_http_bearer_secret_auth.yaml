document:
  dsl: '1.0.0'
  namespace: test
  name: call-http-bearer-secret-auth
  version: '0.1.0'
use:
  secrets:
    - apiToken
do:
  - getProtected:
      call: http
      with:
        method: get
        endpoint:
          uri: http://localhost:9876/api/data
          authentication:
            bearer:
              use: apiToken


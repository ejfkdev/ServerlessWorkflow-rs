document:
  dsl: '1.0.0'
  namespace: test
  name: secret-expression
  version: '0.1.0'
use:
  secrets:
    - mySecret
do:
  - useExpression:
      set:
        superSecret: ${$secret.superman.name}
        theEnemy: ${$secret.superman.enemy.name}
        humanEnemy: ${$secret.superman.enemy.isHuman}

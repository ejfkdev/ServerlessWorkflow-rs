document:
  dsl: '1.0.0'
  namespace: test
  name: call-http-oauth2
  version: '0.1.0'
do:
  - getProtected:
      call: http
      with:
        method: get
        endpoint:
          uri: http://localhost:9876/protected
          authentication:
            oauth2:
              authority: http://localhost:9876
              grant: client_credentials
              client:
                id: test-client
                secret: test-secret
              scopes:
                - read
                - write

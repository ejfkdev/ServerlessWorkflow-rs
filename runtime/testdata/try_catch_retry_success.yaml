document:
  dsl: '1.0.0'
  namespace: test
  name: try-catch-retry-success
  version: '0.1.0'
do:
  - tryTask:
      try:
        - setSuccess:
            set:
              result: success
      catch:
        errors:
          with:
            type: runtime
        retry:
          delay:
            milliseconds: 10
          limit:
            attempt:
              count: 3
        do:
          - handleRetry:
              set:
                recovered: true

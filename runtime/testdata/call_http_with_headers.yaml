document:
  dsl: '1.0.0'
  namespace: test
  name: call-http-with-headers
  version: '0.1.0'
do:
  - getWithHeaders:
      call: http
      with:
        method: get
        endpoint:
          uri: http://localhost:9876/headers
        headers:
          X-Custom-Header: test-value
          Accept: application/json

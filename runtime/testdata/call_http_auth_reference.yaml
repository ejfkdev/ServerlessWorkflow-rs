document:
  dsl: '1.0.0'
  namespace: test
  name: call-http-auth-reference
  version: '0.1.0'
use:
  authentications:
    myBasicAuth:
      basic:
        username: admin
        password: secret123
do:
  - getProtected:
      call: http
      with:
        method: get
        endpoint:
          uri: http://localhost:9876/protected
          authentication:
            use: myBasicAuth

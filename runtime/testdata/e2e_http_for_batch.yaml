document:
  dsl: '1.0.0'
  namespace: test
  name: e2e-http-for-batch
  version: '0.1.0'
do:
  - fetchItems:
      for:
        each: itemId
        in: "${ .itemIds }"
        at: idx
      do:
        - callApi:
            call: http
            with:
              method: get
              endpoint:
                uri: "${ \"http://localhost:PORT/items/\" + ($itemId | tostring) }"
            output:
              as: "${ {id: .id, name: .name} }"

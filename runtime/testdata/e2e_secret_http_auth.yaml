document:
  dsl: '1.0.0'
  namespace: test
  name: e2e-secret-http-auth
  version: '0.1.0'
use:
  secrets:
    - authHeader
do:
  - callProtected:
      call: http
      with:
        method: get
        endpoint:
          uri: http://localhost:PORT/protected
        headers:
          Authorization: "${ $secret.authHeader }"

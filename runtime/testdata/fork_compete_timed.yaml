document:
  dsl: '1.0.0'
  namespace: test
  name: fork-compete-timed
  version: '0.1.0'
do:
  - raceBranches:
      fork:
        compete: true
        branches:
          - fastBranch:
              set:
                winner: fast
          - slowBranch:
              do:
                - waitABit:
                    wait:
                      milliseconds: 5
                - lateResult:
                    set:
                      winner: slow

document:
  dsl: '1.0.0'
  namespace: test
  name: task-timeout-try-catch
  version: '0.1.0'
do:
  - tryWait:
      try:
        - waitForTooLong:
            wait:
              milliseconds: 50
            timeout:
              after: PT0.01S
      catch:
        errors:
          with:
            type: https://serverlessworkflow.io/spec/1.0.0/errors/timeout
        do:
          - handleTimeout:
              set:
                timedOut: true

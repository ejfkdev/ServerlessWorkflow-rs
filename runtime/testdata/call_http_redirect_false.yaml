document:
  dsl: '1.0.0'
  namespace: test
  name: call-http-redirect-false
  version: '0.1.0'
do:
  - postWithRedirectFalse:
      call: http
      with:
        redirect: false
        method: post
        endpoint:
          uri: http://localhost:9876/users
        body:
          firstName: ${.firstName}
          lastName: ${.lastName}

document:
  dsl: '1.0.0'
  namespace: test
  name: basic-secret-expression-auth
  version: '0.1.0'
use:
  secrets:
    - mySecret
do:
  - getApi:
      call: http
      with:
        method: get
        endpoint:
          uri: http://localhost:9876/api
          authentication:
            basic:
              username: "${$secret.mySecret.username}"
              password: "${$secret.mySecret.password}"

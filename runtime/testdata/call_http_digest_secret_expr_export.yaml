document:
  dsl: '1.0.0'
  namespace: test
  name: digest-secret-expression-auth
  version: '0.1.0'
use:
  secrets:
    - mySecret
do:
  - getPage:
      call: http
      with:
        method: get
        endpoint:
          uri: http://localhost:9876/dir/index.html
          authentication:
            digest:
              username: "${$secret.mySecret.username}"
              password: "${$secret.mySecret.password}"
      export:
        as: "${$authorization}"
  - verifyAuth:
      set:
        scheme: "${$context.scheme}"
        param: "${$context.parameter}"
